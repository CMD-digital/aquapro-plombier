<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        overflow-x: hidden;
    }

    .scroll {
        min-height: 200vh;
    }

    .stage {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* BACKGROUND */
    .bg {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 50% 40%, #141414, #000 70%),
            radial-gradient(circle at 20% 30%, rgba(0,122,255,0.10), transparent 40%),
            radial-gradient(circle at 80% 60%, rgba(168,85,247,0.07), transparent 45%);
        transform: scale(1.2);
    }

    .glow {
        position: absolute;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(0,122,255,0.18), transparent 65%);
        filter: blur(120px);
        animation: float 12s ease-in-out infinite;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-60px); }
    }

    /* CONTENT */
    .content {
        position: relative;
        text-align: center;
        max-width: 640px;
        z-index: 2;

        display: flex;
        flex-direction: column;
        align-items: center;

        gap: 6px;
        padding: 0 20px;
    }

    /* LOGO RESPONSIVE */
    .logo {
        width: min(340px, 75vw);
        height: auto;
        opacity: 0.98;
        filter: drop-shadow(0 0 35px rgba(0,122,255,0.28));
        animation: logoFloat 5s ease-in-out infinite;
    }

    @keyframes logoFloat {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* TITLE */
    h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 54px);
        font-weight: 600;
        letter-spacing: -0.04em;
    }

    .subtitle {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.45;
    }

    .fr {
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
        opacity: 0.78;
    }

    .en {
        margin: 0;
        font-size: 13px;
        line-height: 1.6;
        opacity: 0.45;
    }

    .eta {
        margin-top: 10px;
        font-size: 18px;
        opacity: 0.85;
    }

    .eta-en {
        margin: 0;
        font-size: 13px;
        opacity: 0.4;
    }

    /* TABLET */
    @media (max-width: 900px) {
        .logo {
            width: min(300px, 80vw);
        }

        .content {
            gap: 5px;
        }
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .logo {
            width: min(240px, 85vw);
        }

        h1 {
            font-size: clamp(24px, 6vw, 40px);
        }

        .fr {
            font-size: 15px;
        }

        .eta {
            font-size: 16px;
        }
    }
</style>
</head>

<body>

<div class="scroll">
    <div class="stage">

        <div class="bg"></div>
        <div class="glow"></div>

        <div class="content">

            <img class="logo" src="logo.png" alt="logo">

            <h1>Maintenance en cours</h1>

            <div class="subtitle">SYSTEM UPDATE</div>

            <p class="fr">
                Nous travaillons actuellement à l’amélioration du service.
            </p>

            <p class="en">
                We are currently improving the service experience.
            </p>

            <div class="eta">
                Retour estimé bientôt
            </div>

            <div class="eta-en">
                Expected back online shortly
            </div>

        </div>

    </div>
</div>

</body>
</html>
